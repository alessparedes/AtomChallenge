version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: ai_agent_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: ai_agent
    ports:
      - "54321:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

