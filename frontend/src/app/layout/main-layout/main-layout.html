<div class="flex h-screen w-full bg-background text-foreground transition-colors duration-200 overflow-hidden">
    <!-- Sidebar -->
    <aside
        class="border-r border-border bg-card flex flex-col justify-between transition-all duration-300 relative z-20 shrink-0"
        [class.w-64]="!isCollapsed()" [class.w-20]="isCollapsed()">
        <div class="flex flex-col h-full overflow-y-auto overflow-x-hidden">
            <!-- Header -->
            <div class="h-16 flex items-center border-b border-border shrink-0"
                [ngClass]="isCollapsed() ? 'justify-center px-0' : 'justify-between px-6'">
                <div class="flex items-center gap-3 overflow-hidden" [class.hidden]="isCollapsed()">
                    <div
                        class="w-8 h-8 rounded-lg bg-primary/20 flex items-center justify-center shrink-0 border border-primary/30">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-atom text-primary">
                            <circle cx="12" cy="12" r="1" />
                            <path
                                d="M20.2 20.2c2.04-2.03.02-7.36-4.5-11.9-4.54-4.52-9.87-6.54-11.9-4.5-2.04 2.03-.02 7.36 4.5 11.9 4.54 4.52 9.87 6.54 11.9 4.5Z" />
                            <path
                                d="M15.7 15.7c4.52-4.54 6.54-9.87 4.5-11.9-2.03-2.04-7.36-.02-11.9 4.5-4.52 4.54-6.54 9.87-4.5 11.9 2.03 2.04 7.36.02 11.9-4.5Z" />
                        </svg>
                    </div>
                    <h1 class="text-xl font-bold tracking-tight text-foreground truncate">AtomBuilder</h1>
                </div>

                <!-- Collapse Toggle Icon -->
                <button (click)="toggleSidebar()"
                    class="p-2 hover:bg-accent rounded-md text-muted-foreground transition-colors"
                    [title]="isCollapsed() ? 'Expandir menú' : 'Contraer menú'">
                    <svg *ngIf="!isCollapsed()" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="lucide lucide-panel-left-close">
                        <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                        <path d="M9 3v18" />
                        <path d="m16 15-3-3 3-3" />
                    </svg>
                    <svg *ngIf="isCollapsed()" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="lucide lucide-panel-left-open">
                        <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                        <path d="M9 3v18" />
                        <path d="m14 9 3 3-3 3" />
                    </svg>
                </button>
            </div>

            <!-- Main Nav -->
            <nav class="space-y-1.5 px-3 mt-6 flex-1">
                <!-- Dashboard -->
                <a routerLink="/dashboard" routerLinkActive="bg-accent text-accent-foreground"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium hover:bg-accent/50 transition-colors w-full group relative"
                    [ngClass]="isCollapsed() ? 'justify-center' : ''">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-layout-dashboard group-hover:scale-110 transition-transform shrink-0">
                        <rect width="7" height="9" x="3" y="3" rx="1" />
                        <rect width="7" height="5" x="14" y="3" rx="1" />
                        <rect width="7" height="9" x="14" y="12" rx="1" />
                        <rect width="7" height="5" x="3" y="16" rx="1" />
                    </svg>
                    <span [class.hidden]="isCollapsed()" class="truncate">Agentes</span>

                    <!-- Tooltip for collapsed mode -->
                    <span *ngIf="isCollapsed()"
                        class="absolute left-14 bg-popover text-popover-foreground text-xs px-2 py-1 rounded shadow-lg opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity font-semibold z-50 whitespace-nowrap border border-border">Agentes</span>
                </a>

                <!-- Logs -->
                <a routerLink="/logs" routerLinkActive="bg-accent text-accent-foreground"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-muted-foreground hover:bg-accent/50 hover:text-foreground transition-colors w-full group relative"
                    [ngClass]="isCollapsed() ? 'justify-center' : ''">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-terminal-square group-hover:scale-110 transition-transform shrink-0">
                        <path d="m7 11 2-2-2-2" />
                        <path d="M11 13h4" />
                        <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                    </svg>
                    <span [class.hidden]="isCollapsed()" class="truncate">Execution Logs</span>

                    <!-- Tooltip -->
                    <span *ngIf="isCollapsed()"
                        class="absolute left-14 bg-popover text-popover-foreground text-xs px-2 py-1 rounded shadow-lg opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity font-semibold z-50 whitespace-nowrap border border-border">Execution
                        Logs</span>
                </a>

                <!-- Playground -->
                <a routerLink="/playground" routerLinkActive="bg-accent text-accent-foreground"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-muted-foreground hover:bg-accent/50 hover:text-foreground transition-colors w-full group relative"
                    [ngClass]="isCollapsed() ? 'justify-center' : ''">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-bot-message-square group-hover:scale-110 transition-transform shrink-0">
                        <path d="M12 8V4H8" />
                        <rect width="16" height="12" x="4" y="8" rx="2" />
                        <path d="M2 14h2" />
                        <path d="M20 14h2" />
                        <path d="M15 13v2" />
                        <path d="M9 13v2" />
                    </svg>
                    <span [class.hidden]="isCollapsed()" class="truncate">Playground</span>

                    <!-- Tooltip -->
                    <span *ngIf="isCollapsed()"
                        class="absolute left-14 bg-popover text-popover-foreground text-xs px-2 py-1 rounded shadow-lg opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity font-semibold z-50 whitespace-nowrap border border-border">Playground</span>
                </a>
            </nav>

            <!-- Theme Toggle -->
            <div class="px-3 pb-6 border-t border-border pt-4 shrink-0 mt-auto">
                <button (click)="toggleTheme()"
                    class="flex items-center w-full px-3 py-2 text-sm rounded-md text-foreground/80 hover:bg-accent hover:text-foreground transition-colors group relative"
                    [ngClass]="isCollapsed() ? 'justify-center' : 'justify-between'">
                    <span class="flex items-center gap-3 overflow-hidden">
                        <svg *ngIf="isDarkMode" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-moon shrink-0">
                            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                        </svg>
                        <svg *ngIf="!isDarkMode" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-sun shrink-0">
                            <circle cx="12" cy="12" r="4" />
                            <path d="M12 2v2" />
                            <path d="M12 20v2" />
                            <path d="m4.93 4.93 1.41 1.41" />
                            <path d="m17.66 17.66 1.41 1.41" />
                            <path d="M2 12h2" />
                            <path d="M20 12h2" />
                            <path d="m6.34 17.66-1.41 1.41" />
                            <path d="m19.07 4.93-1.41 1.41" />
                        </svg>

                        <span [class.hidden]="isCollapsed()" class="truncate">{{ isDarkMode ? 'Dark Mode' : 'Light Mode'
                            }}</span>
                    </span>

                    <!-- Switch visual indicator (only visible expanded) -->
                    <div [class.hidden]="isCollapsed()" class="w-8 h-4 bg-primary/20 rounded-full relative shrink-0">
                        <div class="absolute w-3 h-3 bg-primary rounded-full top-0.5 transition-all"
                            [class.right-0.5]="isDarkMode" [class.left-0.5]="!isDarkMode"></div>
                    </div>

                    <!-- Tooltip -->
                    <span *ngIf="isCollapsed()"
                        class="absolute left-14 bg-popover text-popover-foreground text-xs px-2 py-1 rounded shadow-lg opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity font-semibold z-50 whitespace-nowrap border border-border">Tema
                        Visual</span>
                </button>
            </div>
        </div>
    </aside>

    <!-- Main Content Route -->
    <main class="flex-1 overflow-auto bg-secondary/30 relative transition-all duration-300 w-full h-full">
        <router-outlet></router-outlet>
    </main>
</div>
